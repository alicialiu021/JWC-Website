  <section id="confirm" class="page active">

    <div class="step-bar">
      <span class="step" onclick="window.location='write.html'" style="cursor:pointer;">Write</span> ▸
      <span class="step active">Confirmation</span>

    <h1>Confirmation</h1>
    <p>Is this the message you wish to write?</p>

    <div style="border:1px solid #ccc; padding:20px; border-radius:6px; min-height:100px;" id="previewBox"></div>

    <div">
      <div class="button" onclick="window.location='write.html'">Back</div>
      <div class="button" style="margin-left:10px;" onclick="sendToArduino()">Confirm & Send</div>

    <p id="status" style="margin-top:20px;"></p>

  <!-- ========== ARDUINO CODE (UPLOAD THIS SEPARATELY) ==========

    Serial.begin(9600);
  }

  void loop() {

      String message = Serial.readStringUntil('\n');
      Serial.println("Received: " + message);

  }

  ============================================================ -->

  <script src="js/script.js"></script>
<!-- Add this to the confirm script section, replace existing script -->
<script>
  if (!sessionStorage.getItem('jwc_session')) {
    location.href = 'login.html';
  }

  const saved = sessionStorage.getItem('jwc_pending_message');
  if (!saved) {
    location.href = 'write.html';
  } else {
    currentMessage = saved;
    document.getElementById('previewBox').innerText = saved;
  }

  window.sendToArduino = function() {
    const status = document.getElementById('status');
    status.textContent = 'Sending to Arduino...';
    status.style.color = '#007bff';

    // Save to current student history
    const currentStudentId = localStorage.getItem('jwc_current_student_id');
    if (currentStudentId) {
      let students = JSON.parse(localStorage.getItem('jwc_students')) || [];
      const student = students.find(s => s.id == currentStudentId);
      if (student) {
        if (!student.history) student.history = [];
        student.history.push(currentMessage);
        localStorage.setItem('jwc_students', JSON.stringify(students));
      }
    }

    // Simulate Arduino send
    setTimeout(() => {
      status.textContent = '✅ Message sent to Arduino successfully!';
      status.style.color = '#28a745';
      sessionStorage.removeItem('jwc_pending_message');
    }, 1500);
  }
</script>
</body>
</html>
