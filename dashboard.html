<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard — Jackson Writing Center</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="centered">
  <div class="card">
    <h1 id="welcome">Welcome</h1>
    <p id="info">This is a protected area for logged-in users.</p>

    <div class="form-actions">
      <button id="logoutBtn" class="button ghost">Logout</button>
      <a href="index.html" class="button">Home</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Ensure user is authenticated
    const session = sessionStorage.getItem('jwc_session');
    if (!session) {
      location.href = 'login.html';
    } else {
      const s = JSON.parse(session);
      document.getElementById('welcome').innerText = `Welcome, ${s.username}`;
    }

    document.getElementById('logoutBtn').addEventListener('click', () => { logoutUser(); });
  </script>
</body>
</html>
